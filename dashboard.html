<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИВГУ Лабиринт — Таблица рейтинга</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1f2e, #071520);
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            padding: 20px;
        }
        .dashboard {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px #ff8c00;
        }
        .qr-section {
            text-align: center;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .qr-code { background: white; display: inline-block; padding: 15px; border-radius: 20px; }
        .qr-code img { width: 180px; height: 180px; display: block; }
        .game-link { color: #ffaa44; word-break: break-all; font-size: 1rem; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 30px; display: inline-block; }
        button { background: #ff5722; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; margin-top: 10px; margin-left: 10px; }
        .leaderboard-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }
        .leaderboard-panel h2 { color: gold; margin-top: 0; text-align: center; }
        .leaderboard-list {
            list-style: none;
            padding: 0;
        }
        .leaderboard-list li {
            background: rgba(255,255,255,0.1);
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 1.1rem;
        }
        .rank-1 { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #1a1a2a; }
        .rank-2 { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .rank-3 { background: linear-gradient(90deg, #cd7f32, #b8692a); }
        .empty-list {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 1.2rem;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
        .refresh-btn { background: #2196f3; }
        .auto-refresh {
            text-align: center;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #4caf50;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>🏆 ИВГУ МЕГА-ЛАБИРИНТ 🏆</h1>
    
    <div class="qr-section">
        <h3>📱 Сканируйте QR-код для игры</h3>
        <div class="qr-code" id="qrCode">
            <img src="qr.jpg" alt="QR-код" style="width:180px; height:180px;" onerror="this.onerror=null; this.src='https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://marikalin19.github.io/game/';">
        </div>
        <div class="game-link" id="gameLink">🔗 https://marikalin19.github.io/game/</div>
        <button id="copyLinkBtn">📋 Копировать ссылку</button>
        <button id="refreshBtn" class="refresh-btn">🔄 Обновить рейтинг</button>
    </div>
    
    <div class="leaderboard-panel">
        <h2>📊 ТАБЛИЦА РЕЙТИНГА</h2>
        <div id="leaderboardContainer">
            <div class="empty-list">Загрузка...</div>
        </div>
        <div class="auto-refresh" id="autoRefreshStatus">🔄 Обновляется автоматически</div>
    </div>
    <div class="footer-note">
        📌 Результаты сохраняются автоматически после каждого финиша
    </div>
</div>

<script>
    const GAME_URL = "https://marikalin19.github.io/game/";
    const STORAGE_KEY = "maze_leaderboard";
    
    function escapeHtml(str) { 
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) { 
            if(m === '&') return '&amp;'; 
            if(m === '<') return '&lt;'; 
            if(m === '>') return '&gt;'; 
            return m; 
        }); 
    }
    
    function loadLeaderboard() {
        const saved = localStorage.getItem(STORAGE_KEY);
        let finishOrder = [];
        if(saved) {
            try {
                finishOrder = JSON.parse(saved);
            } catch(e) {
                console.warn("Ошибка парсинга", e);
            }
        }
        renderLeaderboard(finishOrder);
        return finishOrder;
    }
    
    function renderLeaderboard(finishOrder) {
        const container = document.getElementById('leaderboardContainer');
        
        if(!finishOrder || finishOrder.length === 0) {
            container.innerHTML = '<div class="empty-list">🏁 Пока нет результатов. Пройдите лабиринт до конца!</div>';
            return;
        }
        
        const sorted = [...finishOrder].sort((a,b) => a.position - b.position);
        
        container.innerHTML = `
            <ul class="leaderboard-list">
                ${sorted.map(p => `
                    <li class="${p.position === 1 ? 'rank-1' : p.position === 2 ? 'rank-2' : p.position === 3 ? 'rank-3' : ''}">
                        <span style="font-size:1.4rem; min-width: 50px;">
                            ${p.position === 1 ? '🥇' : p.position === 2 ? '🥈' : p.position === 3 ? '🥉' : `${p.position}.`}
                        </span>
                        <span style="font-size:1.2rem;">${p.emoji || '🧙'}</span>
                        <span style="flex:1;"><strong>${escapeHtml(p.name)}</strong></span>
                        <span>⭐ ${p.score || 0}</span>
                        <span>⏱️ ${((p.time || 0)/1000).toFixed(1)}с</span>
                    </li>
                `).join('')}
            </ul>
        `;
    }
    
    function refreshAndDisplay() {
        const order = loadLeaderboard();
        const timestamp = new Date().toLocaleTimeString();
        console.log(`[${timestamp}] Рейтинг обновлён, записей: ${order.length}`);
    }
    
    function init() {
        document.getElementById('gameLink').innerHTML = `🔗 ${GAME_URL}`;
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(GAME_URL);
            alert('✅ Ссылка скопирована!');
        });
        
        document.getElementById('refreshBtn')?.addEventListener('click', () => {
            refreshAndDisplay();
            const statusDiv = document.getElementById('autoRefreshStatus');
            statusDiv.innerHTML = '🔄 Рейтинг обновлён!';
            setTimeout(() => {
                statusDiv.innerHTML = '🔄 Обновляется автоматически каждые 3 секунды';
            }, 1500);
        });
        
        // Первая загрузка
        refreshAndDisplay();
        
        // Автообновление каждые 3 секунды
        setInterval(() => {
            refreshAndDisplay();
        }, 3000);
        
        // Слушаем изменения localStorage (если игра открыта в другой вкладке)
        window.addEventListener('storage', (e) => {
            if(e.key === STORAGE_KEY) {
                console.log("Обнаружено изменение в другой вкладке!");
                refreshAndDisplay();
            }
        });
        
        // Настройка QR-кода
        const qrImg = document.querySelector('.qr-code img');
        if(qrImg && qrImg.complete && qrImg.naturalWidth === 0) {
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(GAME_URL)}`;
        }
    }
    
    init();
</script>
</body>
</html>
